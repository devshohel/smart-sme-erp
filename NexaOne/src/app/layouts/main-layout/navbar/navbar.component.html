<nav class="navbar top-navbar" [class.sidebar-collapsed]="isSidebarCollapsed">
  <div class="navbar-left">
    <button
      type="button"
      class="btn sidebar-toggle-btn"
      (click)="toggleSidebar()"
      aria-label="Toggle sidebar">
      <i class="bi bi-list"></i>
    </button>

    <div class="search-wrap d-none d-md-block" (click)="keepSearchOpen($event)">
      <div class="search-box">
        <button type="button" class="search-btn" (click)="runSearch(searchInput.value)" aria-label="Search">
          <i class="bi bi-search"></i>
        </button>
      <input
        #searchInput
        type="text"
        class="form-control"
        placeholder="Search..."
          (input)="onSearchInput(searchInput.value)"
          (keydown.enter)="runSearch(searchInput.value)"
      />
      </div>
      <div class="search-suggestions" *ngIf="isSearchOpen && filteredSuggestions.length">
        <button type="button" *ngFor="let item of filteredSuggestions" (click)="navigateSearch(item.route)">
          <span>{{ item.label }}</span>
        </button>
      </div>
      <div class="search-message" *ngIf="searchMessage">{{ searchMessage }}</div>
    </div>
  </div>

  <div class="d-flex align-items-center gap-2 gap-md-3 ms-auto nav-actions">
    <div class="notification-wrap" (click)="keepNotificationsOpen($event)">
    <button class="btn nav-icon-btn position-relative" type="button" aria-label="Notifications" (click)="toggleNotifications($event)">
      <i class="bi bi-bell"></i>
        <span class="notification-badge" *ngIf="notificationCount > 0">{{ notificationCount }}</span>
    </button>

      <div class="notification-menu" *ngIf="isNotificationOpen">
        <div class="notification-header">
          <strong>Notifications</strong>
          <span>{{ notificationCount }} alerts</span>
        </div>

        <div class="notification-empty" *ngIf="!hasNotifications">No notifications</div>

        <ng-container *ngIf="hasNotifications">
          <div class="notification-group" *ngIf="lowStockAlerts.length">
            <h4>Low Stock Alerts</h4>
            <button type="button" class="notification-item" *ngFor="let item of lowStockAlerts | slice:0:4" (click)="navigateFromNotification('/inventory/stocks')">
              <i class="bi bi-exclamation-triangle"></i>
              <span>
                <strong>{{ item.productName }}</strong>
                <small>{{ item.warehouseName }} - Qty {{ item.quantity | number:'1.0-2' }}</small>
              </span>
            </button>
          </div>

          <div class="notification-group" *ngIf="dueAlerts.length">
            <h4>Due Alerts</h4>
            <button type="button" class="notification-item" *ngFor="let item of dueAlerts | slice:0:4" (click)="navigateFromNotification(dueAlertRoute(item))">
              <i class="bi bi-cash-coin"></i>
              <span>
                <strong>{{ item.partyName }}</strong>
                <small>{{ item.type }} - BDT {{ item.dueAmount | number:'1.2-2' }}</small>
              </span>
            </button>
          </div>

          <div class="notification-group" *ngIf="recentTransactions.length">
            <h4>Recent Activity</h4>
            <button type="button" class="notification-item" *ngFor="let item of recentTransactions" (click)="navigateFromNotification(recentTransactionRoute(item))">
              <i class="bi bi-clock-history"></i>
              <span>
                <strong>{{ item.referenceNo }}</strong>
                <small>{{ item.type }} - {{ item.partyName }}</small>
              </span>
            </button>
          </div>
        </ng-container>
      </div>
    </div>

    <div class="dropdown">
      <button
        class="btn user-dropdown-btn dropdown-toggle"
        type="button"
        data-bs-toggle="dropdown"
      >
        <span class="user-info d-none d-sm-flex">
          <strong>{{ displayName }}</strong>
          <small>{{ role }}</small>
        </span>
        <!-- Future: show uploaded user photo from user profile. -->
        <img class="user-avatar" src="assets/images/profile-user.png" alt="">
      </button>

      <ul class="dropdown-menu dropdown-menu-end shadow border-0">
        <li>
          <a class="dropdown-item" routerLink="/settings/change-password">
            <i class="bi bi-person me-2"></i>
            Change Password
          </a>
        </li>
        <li>
          <a class="dropdown-item" routerLink="/settings/company">
            <i class="bi bi-gear me-2"></i>
            Settings
          </a>
        </li>
        <li><hr class="dropdown-divider"></li>
        <li>
          <a class="dropdown-item text-danger" href="#" (click)="$event.preventDefault(); logout()">
            <i class="bi bi-box-arrow-right me-2"></i>
            Logout
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>
