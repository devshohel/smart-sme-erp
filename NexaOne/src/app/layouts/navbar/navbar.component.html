<!--
  NAVBAR COMPONENT - Enhanced Template

  Enhancements:
  - Sidebar toggle button (hamburger menu)
  - LayoutService integration
  - Enhanced search functionality
  - User menu dropdown
  - Notifications panel

  Backward Compatibility:
  - Existing navbar design preserved
  - All existing features maintained
  - Template structure enhanced, not replaced
-->

<nav class="navbar navbar-expand-lg navbar-light bg-white px-4 border-bottom shadow-sm">
  <div class="container-fluid">

    <!-- SIDEBAR TOGGLE BUTTON (NEW) -->
    <button class="btn btn-toggle-sidebar me-3"
            (click)="onSidebarToggle()"
            [title]="isMobile ? 'Open menu' : (sidebarExpanded ? 'Collapse sidebar' : 'Expand sidebar')"
            aria-label="Toggle sidebar">
      <i class="bi bi-list fs-5"></i>
    </button>

    <!-- SEARCH FORM (ENHANCED) -->
    <form class="d-none d-md-flex" (ngSubmit)="onSearch()">
      <div class="input-group">
        <span class="input-group-text bg-light border-0">
          <i class="bi bi-search"></i>
        </span>
        <input type="text"
               class="form-control bg-light border-0"
               placeholder="Search for data..."
               [(ngModel)]="searchQuery"
               (keydown)="onSearchKeydown($event)"
               (focus)="searchFocused = true"
               (blur)="searchFocused = false">
      </div>
    </form>

    <!-- RIGHT SIDE ACTIONS -->
    <div class="ms-auto d-flex align-items-center">

      <!-- MOBILE SEARCH BUTTON (NEW) -->
      <button class="btn btn-mobile-search me-3 d-md-none"
              (click)="focusSearch()"
              aria-label="Search">
        <i class="bi bi-search fs-5"></i>
      </button>

      <!-- NOTIFICATIONS (ENHANCED) -->
      <div class="position-relative me-4 notifications-wrapper"
           style="cursor: pointer;"
           (click)="toggleNotifications()">

        <!-- Notification Bell -->
        <i class="bi bi-bell fs-5"></i>

        <!-- Notification Badge -->
        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
              *ngIf="notificationCount > 0">
          {{ notificationCount > 99 ? '99+' : notificationCount }}
        </span>

        <!-- Notifications Dropdown Panel (NEW) -->
        <div class="notifications-dropdown"
             [class.show]="notificationsOpen"
             *ngIf="notificationsOpen">
          <div class="dropdown-menu show p-0">
            <div class="dropdown-header d-flex justify-content-between align-items-center px-3 py-2">
              <h6 class="m-0">Notifications</h6>
              <button class="btn btn-sm btn-link text-decoration-none p-0"
                      (click)="markAllAsRead()"
                      *ngIf="notificationCount > 0">
                Mark all read
              </button>
            </div>

            <div class="notifications-list px-3" style="max-height: 400px; overflow-y: auto;">
              <!-- Notification Items -->
              <div *ngIf="notifications.length > 0; else noNotifications">
                <div *ngFor="let notification of notifications"
                     class="notification-item dropdown-item px-3 py-2"
                     [class.unread]="!notification.read"
                     (click)="markAsRead(notification)">

                  <div class="d-flex align-items-start">
                    <div class="flex-grow-1">
                      <h6 class="mb-1 small fw-bold">
                        {{ notification.title }}
                      </h6>
                      <p class="mb-1 small text-muted">
                        {{ notification.message }}
                      </p>
                      <small class="text-muted" style="font-size: 11px;">
                        {{ formatTime(notification) }}
                      </small>
                    </div>
                    <div class="ms-2">
                      <span class="badge"
                            [class.bg-success]="notification.type === 'success'"
                            [class.bg-warning]="notification.type === 'warning'"
                            [class.bg-danger]="notification.type === 'error'"
                            [class.bg-info]="notification.type === 'info'">
                      </span>
                    </div>
                  </div>
                </div>
              </div>

              <!-- No Notifications Template -->
              <ng-template #noNotifications>
                <div class="text-center py-4">
                  <i class="bi bi-bell-slash fs-4 text-muted"></i>
                  <p class="small text-muted mt-2">No notifications</p>
                </div>
              </ng-template>
            </div>

            <!-- Footer Actions -->
            <div class="dropdown-footer border-top px-3 py-2" *ngIf="notifications.length > 0">
              <button class="btn btn-sm btn-link text-decoration-none w-100"
                      (click)="clearNotifications()">
                Clear all notifications
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- USER PROFILE DROPDOWN (ENHANCED) -->
      <div class="user-info d-flex align-items-center"
           style="cursor: pointer;"
           (click)="toggleUserMenu()">

        <!-- User Info (Desktop) -->
        <div class="text-end me-2 d-none d-sm-block">
          <p class="m-0 fw-bold small">{{ userName }}</p>
          <p class="m-0 text-muted tiny">{{ userRole }}</p>
        </div>

        <!-- User Avatar -->
        <img [src]="userAvatar"
             class="rounded-circle shadow-sm user-avatar"
             [alt]="userName"
             onerror="this.src='https://i.pravatar.cc/40'">

        <!-- User Dropdown Menu (NEW) -->
        <div class="user-dropdown"
             [class.show]="userMenuOpen"
             *ngIf="userMenuOpen">
          <div class="dropdown-menu show">
            <div class="dropdown-header px-3 py-2">
              <h6 class="m-0">{{ userName }}</h6>
              <small class="text-muted">{{ userRole }}</small>
            </div>

            <a class="dropdown-item" href="#" (click)="goToProfile()">
              <i class="bi bi-person me-2"></i> Profile
            </a>

            <a class="dropdown-item" href="#" (click)="goToSettings()">
              <i class="bi bi-gear me-2"></i> Settings
            </a>

            <div class="dropdown-divider"></div>

            <a class="dropdown-item text-danger" href="#" (click)="onLogout()">
              <i class="bi bi-box-arrow-right me-2"></i> Logout
            </a>
          </div>
        </div>
      </div>

    </div>
  </div>
</nav>

<!-- SEARCH SHORTCUT HINT (NEW - Keyboard Shortcut) -->
<div class="keyboard-shortcut-hint" *ngIf="!isMobile && searchFocused">
  <span class="badge bg-light text-dark">
    <kbd class="me-1">Ctrl</kbd> + <kbd>K</kbd> to focus search
  </span>
</div>
