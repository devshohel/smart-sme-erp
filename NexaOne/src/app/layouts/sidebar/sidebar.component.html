<!--
  SIDEBAR COMPONENT - Enhanced Template

  Enhancements:
  - LayoutService integration
  - Responsive behavior
  - Mobile overlay support
  - Dynamic CSS classes
  - Collapse toggle button

  Backward Compatibility:
  - All existing routes unchanged
  - All existing menu items unchanged
  - toggleInventory() still works
  - All existing CSS classes preserved
-->

<!-- MOBILE OVERLAY (NEW) -->
<div class="sidebar-overlay"
     *ngIf="isMobile"
     [class.active]="mobileSidebarOpen"
     (click)="closeMobileSidebar()">
</div>

<!-- SIDEBAR CONTAINER (ENHANCED) -->
<div class="sidebar shadow-sm vh-100 d-flex flex-column"
     [ngClass]="getSidebarClasses()"
     (keydown)="onKeyDown($event)">

  <!-- BRAND SECTION (UNCHANGED) -->
  <div class="brand-section">
    <i class="bi bi-intersect me-2"></i>Nexa<span class="text-green">One</span>
  </div>

  <!-- COLLAPSE TOGGLE BUTTON (NEW - Desktop only) -->
  <div class="sidebar-toggle-btn" *ngIf="!isMobile">
    <button class="btn-toggle"
            (click)="onSidebarToggle()"
            [title]="sidebarExpanded ? 'Collapse sidebar' : 'Expand sidebar'"
            aria-label="Toggle sidebar">
      <i class="bi"
         [class.bi-chevron-left]="sidebarExpanded"
         [class.bi-chevron-right]="sidebarCollapsed"></i>
    </button>
  </div>

  <!-- NAV LINKS WRAPPER (UNCHANGED STRUCTURE) -->
  <div class="nav-links-wrapper flex-grow-1">

    <!-- DASHBOARD LINK (UNCHANGED) -->
    <a routerLink="/dashboard"
       routerLinkActive="active"
       class="side-link"
       [class.active-in-collapsed]="isRouteActive('/dashboard', true) && sidebarCollapsed">
      <i class="bi bi-grid-1x2-fill icon"></i>
      <span class="menu-text">Dashboard</span>
    </a>

    <!-- INVENTORY DROPDOWN (ENHANCED - Keeps existing functionality) -->
    <div class="inventory-dropdown">
      <a class="side-link dropdown-toggle"
         (click)="toggleInventory()">
        <i class="bi bi-box-seam icon"></i>
        <span class="menu-text">Inventory</span>
        <i class="bi bi-chevron-down dropdown-arrow ms-auto"
           [class.rotate]="isInventoryOpen"></i>
      </a>

      <!-- SUBMENU (UNCHANGED) -->
      <div class="collapse ps-3" [class.show]="isInventoryOpen">
        <a routerLink="/inventory/products"
           routerLinkActive="active"
           class="side-link small"
           (click)="closeMobileSidebar()">
          <i class="bi bi-list-ul icon"></i>
          <span class="menu-text">Products</span>
        </a>

        <a routerLink="/inventory/categories"
           routerLinkActive="active"
           class="side-link small"
           (click)="closeMobileSidebar()">
          <i class="bi bi-tags icon"></i>
          <span class="menu-text">Categories</span>
        </a>

        <a routerLink="/inventory/stocks"
           routerLinkActive="active"
           class="side-link small"
           (click)="closeMobileSidebar()">
          <i class="bi bi-graph-up-arrow icon"></i>
          <span class="menu-text">Stock Levels</span>
        </a>

        <a routerLink="/inventory/uom"
           routerLinkActive="active"
           class="side-link small"
           (click)="closeMobileSidebar()">
          <i class="bi bi-rulers icon"></i>
          <span class="menu-text">UOM Settings</span>
        </a>

        <a routerLink="/inventory/warehouse"
           routerLinkActive="active"
           class="side-link small"
           (click)="closeMobileSidebar()">
          <i class="bi bi-house icon"></i>
          <span class="menu-text">Warehouses</span>
        </a>
      </div>
    </div>

    <!-- SALES & INVOICES LINK (UNCHANGED) -->
    <a routerLink="/sales"
       routerLinkActive="active"
       class="side-link"
       [class.active-in-collapsed]="isRouteActive('/sales', true) && sidebarCollapsed"
       (click)="closeMobileSidebar()">
      <i class="bi bi-cart-check icon"></i>
      <span class="menu-text">Sales & Invoices</span>
    </a>

    <!-- CUSTOMERS LINK (UNCHANGED) -->
    <a routerLink="/customers"
       routerLinkActive="active"
       class="side-link"
       [class.active-in-collapsed]="isRouteActive('/customers', true) && sidebarCollapsed"
       (click)="closeMobileSidebar()">
      <i class="bi bi-people icon"></i>
      <span class="menu-text">Customers</span>
    </a>

    <!-- REPORTS LINK (UNCHANGED) -->
    <a routerLink="/reports"
       routerLinkActive="active"
       class="side-link"
       [class.active-in-collapsed]="isRouteActive('/reports', true) && sidebarCollapsed"
       (click)="closeMobileSidebar()">
      <i class="bi bi-bar-chart-line icon"></i>
      <span class="menu-text">Reports</span>
    </a>

  </div>

  <!-- SIDEBAR FOOTER (UNCHANGED) -->
  <div class="sidebar-footer">
    <button class="btn btn-logout w-100">
      <i class="bi bi-box-arrow-left me-2"></i>
      <span class="menu-text">Logout</span>
    </button>
  </div>

</div>

<!-- ACCESSIBILITY: Screen reader only text -->
<div class="sr-only" aria-live="polite">
  <span *ngIf="sidebarExpanded">Sidebar expanded</span>
  <span *ngIf="sidebarCollapsed">Sidebar collapsed</span>
  <span *ngIf="mobileSidebarOpen">Mobile sidebar open</span>
</div>
