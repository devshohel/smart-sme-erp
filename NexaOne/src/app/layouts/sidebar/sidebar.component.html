<div class="sidebar shadow-sm vh-100 d-flex flex-column">
  <div class="brand-section">
    <i class="bi bi-intersect me-2"></i>Nexa<span class="text-green">One</span>
  </div>

  <div class="nav-links-wrapper flex-grow-1">
    <a routerLink="/dashboard" routerLinkActive="active" class="side-link">
      <i class="bi bi-grid-1x2-fill icon"></i> Dashboard
    </a>

    <div class="inventory-dropdown">
      <a
        class="side-link dropdown-toggle"
        (click)="toggleProducts()"
        role="button"
        [attr.aria-expanded]="isProductsOpen"
      >
        <i class="bi bi-box icon"></i> Products
      </a>

      <div class="collapse ps-3" [class.show]="isProductsOpen" id="productsSubMenu">
        <a routerLink="/products/products" routerLinkActive="active" class="side-link small">
          <i class="bi bi-list-ul icon"></i> Products
        </a>
        <a routerLink="/products/categories" routerLinkActive="active" class="side-link small">
          <i class="bi bi-tags icon"></i> Categories
        </a>
        <a routerLink="/products/brands" routerLinkActive="active" class="side-link small">
          <i class="bi bi-bookmark icon"></i> Brands
        </a>
        <a routerLink="/products/uom" routerLinkActive="active" class="side-link small">
          <i class="bi bi-rulers icon"></i> UOM Settings
        </a>
      </div>
    </div>

    <div class="inventory-dropdown">
      <a
        class="side-link dropdown-toggle"
        (click)="toggleInventory()"
        role="button"
        [attr.aria-expanded]="isInventoryOpen"
      >
        <i class="bi bi-box-seam icon"></i> Inventory
      </a>

      <div class="collapse ps-3" [class.show]="isInventoryOpen" id="inventorySubMenu">
        <a routerLink="/inventory/stocks" routerLinkActive="active" class="side-link small">
          <i class="bi bi-graph-up-arrow icon"></i> Stock Levels
        </a>
        <a routerLink="/inventory/adjustments" routerLinkActive="active" class="side-link small">
          <i class="bi bi-sliders icon"></i> Stock Adjustments
        </a>
        <a routerLink="/inventory/movements" routerLinkActive="active" class="side-link small">
          <i class="bi bi-arrow-left-right icon"></i> Stock Movements
        </a>
        <a routerLink="/inventory/warehouses" routerLinkActive="active" class="side-link small">
          <i class="bi bi-house icon"></i> Warehouses
        </a>
      </div>
    </div>

    <a routerLink="/sales" routerLinkActive="active" class="side-link">
      <i class="bi bi-cart-check icon"></i> Sales & Invoices
    </a>
    <a routerLink="/customers" routerLinkActive="active" class="side-link">
      <i class="bi bi-people icon"></i> Customers
    </a>
    <a routerLink="/reports" routerLinkActive="active" class="side-link">
      <i class="bi bi-bar-chart-line icon"></i> Reports
    </a>
  </div>

  <div class="sidebar-footer">
    <button class="btn btn-logout w-100">
      <i class="bi bi-box-arrow-left me-2"></i> Logout
    </button>
  </div>
</div>
