<div class="notification-stack" aria-live="polite" aria-atomic="true">
  <div
    class="app-toast shadow-sm"
    *ngFor="let notification of notifications$ | async"
    [class.toast-success]="notification.type === 'success'"
    [class.toast-warning]="notification.type === 'warning'"
    [class.toast-error]="notification.type === 'error'">
    <i class="bi"
       [class.bi-check-circle-fill]="notification.type === 'success'"
       [class.bi-exclamation-triangle-fill]="notification.type === 'warning'"
       [class.bi-x-circle-fill]="notification.type === 'error'"></i>
    <span>{{ notification.message }}</span>
    <button type="button" class="btn-close btn-close-sm" aria-label="Dismiss" (click)="dismiss(notification)"></button>
  </div>
</div>
