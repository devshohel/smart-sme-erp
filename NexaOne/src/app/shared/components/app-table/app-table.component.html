<div class="table-responsive app-table">

  <div class="table-loading" *ngIf="loading">
    <span class="spinner-border spinner-border-sm text-success" role="status" aria-hidden="true"></span>
    <span>Loading records...</span>
  </div>

  <table class="table align-middle" [class.is-loading]="loading">

    <thead>
      <tr>

        <th *ngFor="let header of headers">
          {{ header }}
        </th>

      </tr>
    </thead>

    <tbody>
      <ng-content></ng-content>
    </tbody>

  </table>

  <app-empty-state *ngIf="!loading && empty" [title]="emptyTitle" [message]="emptyMessage"></app-empty-state>

</div>
