<div class="container-fluid py-4">
  <app-page-header title="Invoice Settings" subtitle="Document prefixes and invoice defaults."></app-page-header>

  <app-card title="Invoice Numbering">
    <div class="alert alert-danger" *ngIf="errorMessage">{{ errorMessage }}</div>
    <div class="alert alert-success" *ngIf="successMessage">{{ successMessage }}</div>
    <div class="text-muted py-4" *ngIf="loading">Loading invoice settings...</div>

    <form *ngIf="!loading" (ngSubmit)="save()">
      <div class="row g-3">
        <div class="col-md-6 col-lg-3">
          <label class="form-label">Sales Invoice Prefix</label>
          <input class="form-control" name="salesInvoicePrefix" [(ngModel)]="settings.salesInvoicePrefix" [disabled]="!canEdit()" required>
        </div>
        <div class="col-md-6 col-lg-3">
          <label class="form-label">Purchase Invoice Prefix</label>
          <input class="form-control" name="purchaseInvoicePrefix" [(ngModel)]="settings.purchaseInvoicePrefix" [disabled]="!canEdit()" required>
        </div>
        <div class="col-md-6 col-lg-3">
          <label class="form-label">Sales Order Prefix</label>
          <input class="form-control" name="salesOrderPrefix" [(ngModel)]="settings.salesOrderPrefix" [disabled]="!canEdit()" required>
        </div>
        <div class="col-md-6 col-lg-3">
          <label class="form-label">Purchase Order Prefix</label>
          <input class="form-control" name="purchaseOrderPrefix" [(ngModel)]="settings.purchaseOrderPrefix" [disabled]="!canEdit()" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">Next Invoice Number</label>
          <input class="form-control" type="number" min="1" name="nextInvoiceNumber" [(ngModel)]="settings.nextInvoiceNumber" [disabled]="!canEdit()" required>
        </div>
        <div class="col-md-8">
          <label class="form-label">Default Payment Terms</label>
          <input class="form-control" name="defaultPaymentTerms" [(ngModel)]="settings.defaultPaymentTerms" [disabled]="!canEdit()">
        </div>
        <div class="col-12">
          <label class="form-label">Invoice Footer Text</label>
          <textarea class="form-control" rows="4" name="invoiceFooterText" [(ngModel)]="settings.invoiceFooterText" [disabled]="!canEdit()"></textarea>
        </div>
      </div>

      <div class="d-flex justify-content-end gap-2 mt-4">
        <button class="btn btn-outline-secondary" type="button" (click)="load()" [disabled]="loading || saving">Reset</button>
        <button class="btn btn-success" type="submit" [disabled]="!canEdit() || saving">{{ saving ? 'Saving...' : 'Save Settings' }}</button>
      </div>
    </form>
  </app-card>
</div>
