<div class="container-fluid p-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0">Units of Measure (UOM)</h4>
    <button class="btn btn-success btn-sm px-3"><i class="bi bi-plus-lg me-1"></i> New UOM</button>
  </div>

  <div class="card border-0 shadow-sm col-md-8">
    <div class="card-body p-0">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th class="ps-4">UOM Name</th>
            <th>Type</th>
            <th class="text-center pe-4">Action</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td class="ps-4 fw-semibold">Kilogram</td>
            <td>Weight</td>
            <td class="text-center pe-4">
              <button class="btn btn-sm btn-light border"><i class="bi bi-pencil text-primary"></i></button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
