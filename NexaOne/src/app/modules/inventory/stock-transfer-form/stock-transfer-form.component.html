<div class="inventory-page container-fluid p-4">
  <div class="page-actions mb-3">
    <app-page-header [title]="transferId ? 'Edit Stock Transfer' : 'Create Stock Transfer'" subtitle="Prepare warehouse-to-warehouse transfer request."></app-page-header>
    <button type="button" class="btn btn-outline-secondary" (click)="back()"><i class="bi bi-arrow-left me-1"></i> Back</button>
  </div>

  <section class="form-card">
    <div class="alert alert-danger" *ngIf="errorMessage">{{ errorMessage }}</div>
    <div class="loading-panel" *ngIf="loading"><span class="spinner-border spinner-border-sm me-2"></span> Loading transfer...</div>

    <form *ngIf="!loading" (ngSubmit)="save()" novalidate>
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label">From Warehouse *</label>
          <select class="form-select" [(ngModel)]="transfer.fromWarehouseId" name="fromWarehouseId" (change)="onWarehouseChange()" required>
            <option [ngValue]="null">Select Warehouse</option>
            <option *ngFor="let warehouse of warehouses" [ngValue]="warehouse.id">{{ warehouse.name }}</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">To Warehouse *</label>
          <select class="form-select" [(ngModel)]="transfer.toWarehouseId" name="toWarehouseId" required>
            <option [ngValue]="null">Select Warehouse</option>
            <option *ngFor="let warehouse of warehouses" [ngValue]="warehouse.id">{{ warehouse.name }}</option>
          </select>
          <div class="text-danger small mt-1" *ngIf="transfer.fromWarehouseId && transfer.fromWarehouseId === transfer.toWarehouseId">
            From and to warehouse cannot be same.
          </div>
        </div>
        <div class="col-md-4">
          <label class="form-label">Status</label>
          <select class="form-select" [(ngModel)]="transfer.status" name="status">
            <option *ngFor="let status of statusOptions()" [value]="status">{{ status }}</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Transfer Date *</label>
          <input class="form-control" type="date" [(ngModel)]="transfer.transferDate" name="transferDate" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">Expected Date</label>
          <input class="form-control" type="date" [(ngModel)]="transfer.expectedDate" name="expectedDate">
        </div>
        <div class="col-md-4">
          <label class="form-label">Remarks</label>
          <input class="form-control" [(ngModel)]="transfer.remarks" name="remarks" placeholder="Optional notes">
        </div>
      </div>

      <hr>

      <div class="items-heading">
        <h6>Transfer Items</h6>
        <button type="button" class="btn btn-outline-success btn-sm" (click)="addItem()"><i class="bi bi-plus me-1"></i> Add Row</button>
      </div>

      <div class="table-responsive">
        <table class="table align-middle">
          <thead class="table-light">
            <tr>
              <th>Product *</th>
              <th class="text-end">Current Stock</th>
              <th class="text-end">Quantity *</th>
              <th>Remarks</th>
              <th class="text-center">Action</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let item of transfer.items; let i = index">
              <td>
                <select class="form-select" [(ngModel)]="item.productId" [name]="'productId' + i" (change)="onProductChange(item)" required>
                  <option [ngValue]="null">Select Product</option>
                  <option *ngFor="let product of products" [ngValue]="product.id">{{ product.productName }} - {{ product.sku }}</option>
                </select>
              </td>
              <td class="text-end">{{ item.currentStock ?? '-' }}</td>
              <td><input class="form-control text-end" type="number" step="0.01" min="0.01" [(ngModel)]="item.quantity" [name]="'quantity' + i" required></td>
              <td><input class="form-control" [(ngModel)]="item.remarks" [name]="'remarks' + i"></td>
              <td class="text-center">
                <button type="button" class="btn btn-sm btn-outline-danger" (click)="removeItem(i)" [disabled]="transfer.items.length === 1">
                  <i class="bi bi-trash"></i>
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="d-flex justify-content-end gap-2 mt-3">
        <button type="button" class="btn btn-outline-secondary" (click)="back()" [disabled]="submitting">Cancel</button>
        <button type="submit" class="btn btn-success px-4" [disabled]="submitting || !isValid()">
          {{ submitting ? 'Saving...' : 'Save Transfer' }}
        </button>
      </div>
    </form>
  </section>
</div>
