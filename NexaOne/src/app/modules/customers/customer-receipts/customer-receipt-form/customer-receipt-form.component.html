<div class="container-fluid p-4">
  <app-page-header
    [title]="isEditMode ? 'Edit Customer Receipt' : 'Create Customer Receipt'"
    subtitle="Record customer receipts and post them to accounting when ready.">
  </app-page-header>

  <app-card
    [title]="isEditMode ? 'Receipt Update Form' : 'Receipt Entry Form'"
    subtitle="Keep draft receipts editable until they are posted.">
    <form [formGroup]="form" (ngSubmit)="saveDraft()" novalidate>
      <div class="alert alert-warning mb-3" *ngIf="isEditMode && !editable">
        This receipt is posted or cancelled and can no longer be edited.
      </div>
      <div class="alert alert-danger mb-3" *ngIf="errorMessage">{{ errorMessage }}</div>

      <div class="row g-3">
        <div class="col-lg-6 position-relative">
          <label class="form-label">Customer *</label>
          <input
            type="text"
            class="form-control"
            [value]="customerSearchTerm"
            (input)="searchCustomers($any($event.target).value)"
            [readonly]="!editable"
            placeholder="Search customer code or name">
          <div class="customer-suggestions" *ngIf="customerSuggestions.length && editable">
            <button type="button" class="customer-suggestion" *ngFor="let customer of customerSuggestions" (click)="selectCustomer(customer.id, customer.customerCode || '', customer.name)">
              <strong>{{ customer.customerCode || 'CUS' }} - {{ customer.name }}</strong>
              <small>{{ customer.phone || 'No phone' }}</small>
            </button>
          </div>
          <input type="hidden" formControlName="customerId">
          <div class="invalid-feedback d-block" *ngIf="hasError('customerId', 'required')">Customer is required.</div>
        </div>

        <div class="col-lg-3 col-md-6">
          <label class="form-label">Receipt Date *</label>
          <input type="date" class="form-control" formControlName="receiptDate">
          <div class="invalid-feedback d-block" *ngIf="hasError('receiptDate', 'required')">Receipt date is required.</div>
        </div>

        <div class="col-lg-3 col-md-6">
          <label class="form-label">Amount *</label>
          <input type="number" class="form-control" formControlName="amount" step="0.01" min="0.01">
          <div class="invalid-feedback d-block" *ngIf="hasError('amount', 'required')">Amount is required.</div>
          <div class="invalid-feedback d-block" *ngIf="hasError('amount', 'min')">Amount must be greater than zero.</div>
        </div>

        <div class="col-lg-4 col-md-6">
          <label class="form-label">Payment Method *</label>
          <select class="form-select" formControlName="paymentMethod">
            <option *ngFor="let method of paymentMethods" [value]="method">{{ method }}</option>
          </select>
        </div>

        <div class="col-lg-4 col-md-6">
          <label class="form-label">Reference No</label>
          <input type="text" class="form-control" formControlName="referenceNo" [readonly]="!editable">
        </div>

        <div class="col-12">
          <label class="form-label">Notes</label>
          <textarea class="form-control" rows="3" formControlName="notes" [readonly]="!editable"></textarea>
        </div>
      </div>

      <div class="d-flex flex-wrap justify-content-end gap-2 mt-4">
        <button type="button" class="btn btn-outline-secondary" (click)="cancel()" [disabled]="submitting">
          Cancel
        </button>
        <button type="button" class="btn btn-outline-success" (click)="saveDraft()" [disabled]="submitting || loading || !editable">
          {{ submitting ? 'Saving...' : 'Save Draft' }}
        </button>
        <button type="button" class="btn btn-success px-4" (click)="saveAndPost()" [disabled]="submitting || loading || !editable">
          {{ submitting ? 'Posting...' : 'Save & Post' }}
        </button>
      </div>
    </form>
  </app-card>
</div>
