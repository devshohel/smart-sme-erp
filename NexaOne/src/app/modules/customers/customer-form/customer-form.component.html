<div class="customer-form-page">
  <app-page-header
    [title]="isEditMode ? 'Edit Customer' : 'Create Customer'"
    subtitle="Maintain customer master data, balances, and status.">
  </app-page-header>

  <section class="customer-form-panel">
    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div class="alert alert-danger mb-3" *ngIf="errorMessage">{{ errorMessage }}</div>

      <div class="form-section">
        <div class="section-heading">
          <h5>Customer Details</h5>
        </div>

        <div class="form-grid three">
          <div class="field-group">
            <label class="form-label">Customer Code</label>
            <input type="text" class="form-control" formControlName="customerCode" readonly>
            <div class="form-text">Handled automatically by backend.</div>
          </div>

          <div class="field-group span-2">
            <label class="form-label">Name *</label>
            <input type="text" class="form-control" formControlName="name">
            <div class="invalid-feedback d-block" *ngIf="hasError('name', 'required')">Customer name is required.</div>
          </div>

          <div class="field-group">
            <label class="form-label">Company Name</label>
            <input type="text" class="form-control" formControlName="companyName">
          </div>

          <div class="field-group">
            <label class="form-label">Phone</label>
            <input type="text" class="form-control" formControlName="phone">
          </div>

          <div class="field-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" formControlName="email">
            <div class="invalid-feedback d-block" *ngIf="hasError('email', 'email')">Email format is invalid.</div>
          </div>

          <div class="field-group">
            <label class="form-label">Status *</label>
            <select class="form-select" formControlName="status">
              <option *ngFor="let status of statusList" [value]="status">{{ status }}</option>
            </select>
          </div>

          <div class="field-group">
            <label class="form-label">Tax Number</label>
            <input type="text" class="form-control" formControlName="taxNumber">
          </div>
        </div>
      </div>

      <div class="form-section">
        <div class="section-heading">
          <h5>Address</h5>
        </div>

        <div class="form-grid three">
          <div class="field-group span-3">
            <label class="form-label">Street Address</label>
            <textarea class="form-control address-input" rows="3" formControlName="address"></textarea>
          </div>

          <div class="field-group">
            <label class="form-label">City</label>
            <input type="text" class="form-control" formControlName="city">
          </div>

          <div class="field-group">
            <label class="form-label">Country</label>
            <input type="text" class="form-control" formControlName="country">
          </div>

          <div class="field-group">
            <label class="form-label">Postal Code</label>
            <input type="text" class="form-control" formControlName="postalCode">
          </div>
        </div>
      </div>

      <div class="form-section">
        <div class="section-heading">
          <h5>Balances</h5>
        </div>

        <div class="form-grid three">
          <div class="field-group">
            <label class="form-label">Credit Limit</label>
            <input type="number" class="form-control" formControlName="creditLimit" min="0" step="0.01">
            <div class="invalid-feedback d-block" *ngIf="hasError('creditLimit', 'min')">Credit limit cannot be negative.</div>
          </div>

          <div class="field-group">
            <label class="form-label">Opening Balance</label>
            <input type="number" class="form-control" formControlName="openingBalance" min="0" step="0.01">
            <div class="invalid-feedback d-block" *ngIf="hasError('openingBalance', 'min')">Opening balance cannot be negative.</div>
          </div>

          <div class="field-group">
            <label class="form-label">Current Balance</label>
            <input type="number" class="form-control muted-field" formControlName="currentBalance" step="0.01" readonly>
            <div class="form-text">Managed by invoices, returns, and payments.</div>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-outline-secondary" (click)="cancel()" [disabled]="submitting || loading">
          Cancel
        </button>
        <button type="submit" class="btn btn-success px-4" [disabled]="submitting || loading || form.invalid">
          {{ submitting ? 'Saving...' : (isEditMode ? 'Update Customer' : 'Save Customer') }}
        </button>
      </div>
    </form>
  </section>
</div>
