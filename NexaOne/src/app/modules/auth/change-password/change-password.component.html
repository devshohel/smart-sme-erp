<div class="auth-page">
  <section class="auth-panel password-panel">
    <div class="panel-header">
      <div class="icon-circle">
        <i class="bi bi-key"></i>
      </div>
      <div>
        <h1>Change Password</h1>
        <p>Update your login password for the current account.</p>
      </div>
    </div>

    <form class="auth-form" (ngSubmit)="submit()">
      <div class="alert alert-success" *ngIf="successMessage">{{ successMessage }}</div>
      <div class="alert alert-danger" *ngIf="errorMessage">{{ errorMessage }}</div>

      <label class="form-label">Current Password</label>
      <div class="input-group">
        <input class="form-control" name="oldPassword" [(ngModel)]="form.oldPassword" [type]="showOldPassword ? 'text' : 'password'" autocomplete="current-password" required>
        <button class="btn btn-outline-secondary" type="button" (click)="showOldPassword = !showOldPassword">
          <i class="bi" [ngClass]="showOldPassword ? 'bi-eye-slash' : 'bi-eye'"></i>
        </button>
      </div>

      <label class="form-label mt-3">New Password</label>
      <div class="input-group">
        <input class="form-control" name="newPassword" [(ngModel)]="form.newPassword" [type]="showNewPassword ? 'text' : 'password'" autocomplete="new-password" required>
        <button class="btn btn-outline-secondary" type="button" (click)="showNewPassword = !showNewPassword">
          <i class="bi" [ngClass]="showNewPassword ? 'bi-eye-slash' : 'bi-eye'"></i>
        </button>
      </div>

      <label class="form-label mt-3">Confirm New Password</label>
      <div class="input-group">
        <input class="form-control" name="confirmNewPassword" [(ngModel)]="form.confirmNewPassword" [type]="showConfirmPassword ? 'text' : 'password'" autocomplete="new-password" required>
        <button class="btn btn-outline-secondary" type="button" (click)="showConfirmPassword = !showConfirmPassword">
          <i class="bi" [ngClass]="showConfirmPassword ? 'bi-eye-slash' : 'bi-eye'"></i>
        </button>
      </div>

      <div class="action-row mt-4">
        <button class="btn btn-outline-secondary" type="button" routerLink="/dashboard">Cancel</button>
        <button class="btn btn-success" type="submit" [disabled]="loading">
          <span class="spinner-border spinner-border-sm me-2" *ngIf="loading"></span>
          {{ loading ? 'Saving...' : 'Save Password' }}
        </button>
      </div>
    </form>
  </section>
</div>
