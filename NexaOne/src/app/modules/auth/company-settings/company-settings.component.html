<div class="container-fluid p-4">
  <app-page-header title="Company Settings" subtitle="Company profile and business identity."></app-page-header>

  <app-card title="Company Profile">
    <div class="alert alert-danger" *ngIf="errorMessage">{{ errorMessage }}</div>
    <div class="alert alert-success" *ngIf="successMessage">{{ successMessage }}</div>
    <div class="text-muted py-4" *ngIf="loading">Loading company settings...</div>

    <form *ngIf="!loading" (ngSubmit)="save()">
      <div class="row g-3">
        <div class="col-lg-8">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Company Name</label>
              <input class="form-control" name="companyName" [(ngModel)]="settings.companyName" [disabled]="!canEdit()" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Business Type</label>
              <input class="form-control" name="businessType" [(ngModel)]="settings.businessType" [disabled]="!canEdit()">
            </div>
            <div class="col-md-6">
              <label class="form-label">Email</label>
              <input class="form-control" type="email" name="email" [(ngModel)]="settings.email" [disabled]="!canEdit()">
            </div>
            <div class="col-md-6">
              <label class="form-label">Phone</label>
              <input class="form-control" name="phone" [(ngModel)]="settings.phone" [disabled]="!canEdit()">
            </div>
            <div class="col-12">
              <label class="form-label">Address</label>
              <textarea class="form-control" name="address" rows="3" [(ngModel)]="settings.address" [disabled]="!canEdit()"></textarea>
            </div>
            <div class="col-md-4">
              <label class="form-label">City</label>
              <input class="form-control" name="city" [(ngModel)]="settings.city" [disabled]="!canEdit()">
            </div>
            <div class="col-md-4">
              <label class="form-label">Country</label>
              <input class="form-control" name="country" [(ngModel)]="settings.country" [disabled]="!canEdit()">
            </div>
            <div class="col-md-4">
              <label class="form-label">Status</label>
              <select class="form-select" name="status" [(ngModel)]="settings.status" [disabled]="!canEdit()">
                <option *ngFor="let status of statusList" [value]="status">{{ status }}</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label">Tax Number / BIN</label>
              <input class="form-control" name="taxNumber" [(ngModel)]="settings.taxNumber" [disabled]="!canEdit()">
            </div>
            <div class="col-md-4">
              <label class="form-label">Currency</label>
              <input class="form-control" name="currency" [(ngModel)]="settings.currency" [disabled]="!canEdit()" required>
            </div>
            <div class="col-md-4">
              <label class="form-label">Timezone</label>
              <input class="form-control" name="timezone" [(ngModel)]="settings.timezone" [disabled]="!canEdit()" required>
            </div>
          </div>
        </div>

        <div class="col-lg-4">
          <div class="border rounded-2 p-3 h-100">
            <label class="form-label">Logo URL</label>
            <input class="form-control mb-3" name="logoUrl" [(ngModel)]="settings.logoUrl" [disabled]="!canEdit()">
            <div class="bg-light border rounded-2 d-flex align-items-center justify-content-center" style="min-height: 160px;">
              <img *ngIf="settings.logoUrl" [src]="settings.logoUrl" alt="Company logo" class="img-fluid" style="max-height: 140px;">
              <div *ngIf="!settings.logoUrl" class="text-muted text-center">
                <i class="bi bi-building fs-1 d-block"></i>
                Logo Placeholder
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="d-flex justify-content-end gap-2 mt-4">
        <button class="btn btn-outline-secondary" type="button" (click)="load()" [disabled]="loading || saving">Reset</button>
        <button class="btn btn-success" type="submit" [disabled]="!canEdit() || saving">{{ saving ? 'Saving...' : 'Save Settings' }}</button>
      </div>
    </form>
  </app-card>
</div>
