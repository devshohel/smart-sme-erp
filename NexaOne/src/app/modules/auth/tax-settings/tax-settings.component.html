<div class="container-fluid p-4">
  <app-page-header title="Tax Settings" subtitle="Default tax configuration for future transaction integration."></app-page-header>

  <app-card title="Tax Configuration">
    <div class="alert alert-danger" *ngIf="errorMessage">{{ errorMessage }}</div>
    <div class="alert alert-success" *ngIf="successMessage">{{ successMessage }}</div>
    <div class="text-muted py-4" *ngIf="loading">Loading tax settings...</div>

    <form *ngIf="!loading" (ngSubmit)="save()">
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label">Tax Name</label>
          <input class="form-control" name="taxName" [(ngModel)]="settings.taxName" [disabled]="!canEdit()" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">Tax Rate</label>
          <div class="input-group">
            <input class="form-control" type="number" min="0" step="0.01" name="taxRate" [(ngModel)]="settings.taxRate" [disabled]="!canEdit()" required>
            <span class="input-group-text">%</span>
          </div>
        </div>
        <div class="col-md-4">
          <label class="form-label">Status</label>
          <select class="form-select" name="status" [(ngModel)]="settings.status" [disabled]="!canEdit()">
            <option *ngFor="let status of statusList" [value]="status">{{ status }}</option>
          </select>
        </div>
        <div class="col-12">
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" role="switch" id="defaultTaxEnabled" name="defaultTaxEnabled" [(ngModel)]="settings.defaultTaxEnabled" [disabled]="!canEdit()">
            <label class="form-check-label" for="defaultTaxEnabled">Default Tax Enabled</label>
          </div>
        </div>
      </div>

      <div class="d-flex justify-content-end gap-2 mt-4">
        <button class="btn btn-outline-secondary" type="button" (click)="load()" [disabled]="loading || saving">Reset</button>
        <button class="btn btn-success" type="submit" [disabled]="!canEdit() || saving">{{ saving ? 'Saving...' : 'Save Settings' }}</button>
      </div>
    </form>
  </app-card>
</div>
