# Development keeps Hibernate update for local iteration only.
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
# Development-only fallback so local startup works without environment setup.
# Production overrides this in application-prod.properties and must use JWT_SECRET.
app.jwt.secret=${JWT_SECRET:${DEV_JWT_SECRET:smart-sme-erp-development-only-jwt-secret-2026-local}}
