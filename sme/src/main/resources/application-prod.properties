# Production must be fully environment-driven.
server.port=${SERVER_PORT}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

app.jwt.secret=${JWT_SECRET}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false
server.compression.enabled=true
server.compression.mime-types=application/json,application/javascript,text/css,text/html,text/plain
server.forward-headers-strategy=framework

management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.endpoint.health.probes.add-additional-paths=true
management.endpoint.health.show-details=never
management.endpoint.health.group.readiness.include=readinessState,db
management.endpoint.health.group.liveness.include=livenessState
management.health.db.enabled=true

logging.level.root=INFO
logging.level.com.sme.erp=INFO
logging.level.org.springframework.security=WARN
logging.file.name=${LOG_FILE:logs/smart-sme-erp.log}
logging.logback.rollingpolicy.file-name-pattern=${LOG_FILE_PATTERN:logs/smart-sme-erp.%d{yyyy-MM-dd}.%i.log.gz}
logging.logback.rollingpolicy.max-file-size=${LOG_MAX_FILE_SIZE:20MB}
logging.logback.rollingpolicy.max-history=${LOG_MAX_HISTORY:30}
logging.logback.rollingpolicy.total-size-cap=${LOG_TOTAL_SIZE_CAP:2GB}
logging.pattern.level=%5p [traceId:%X{traceId:-}]
