spring.application.name=sme


#spring.datasource.driverClassName=com.mysql.jdbc.driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/sme}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.profiles.default=dev

# The SQL dialect makes Hibernate generate better SQL for the chosen database
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
#spring.jpa.properties.hibernate.current_session_context_class=org.springframework.orm.hibernate5.SpringSessionContext

# Hibernate schema mutation is profile-specific.
spring.jpa.generate-ddl=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.baseline-description=existing schema baseline
spring.flyway.out-of-order=false

app.jwt.secret=${JWT_SECRET:}
app.jwt.expiration-ms=${JWT_ACCESS_EXPIRATION_MS:900000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:1209600000}
app.jwt.clock-skew-seconds=${JWT_CLOCK_SKEW_SECONDS:60}
app.security.max-failed-login-attempts=${MAX_FAILED_LOGIN_ATTEMPTS:5}
app.security.lock-duration-minutes=${ACCOUNT_LOCK_MINUTES:15}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}
app.audit.activity-log-retention-years=${ACTIVITY_LOG_RETENTION_YEARS:2}
app.audit.security-log-retention-years=${SECURITY_LOG_RETENTION_YEARS:5}

spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=3MB
erp.storage.product-image-dir=uploads/products
erp.upload.max-product-image-size=2097152
erp.storage.expense-receipt-dir=uploads/expense-receipts
erp.upload.max-expense-receipt-size=5242880
